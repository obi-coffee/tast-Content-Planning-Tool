<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tast content ops</title>
    <!-- Inter Variable — the UI workhorse -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // ── tast core palette (April 2026 guide) ────
              'rich-black': '#1A1A1A',
              'mist':       '#F8F8F5',  // primary light background
              'bloom':      '#FDFCF8',  // light card background
              'london-fog': '#F8F8F5',  // legacy alias → mist (safe to remove later)
              'no2':        '#F287B7',
              'pink':       '#F05881',  // primary CTA only
              'no3':        '#EF4056',
              'raspberry':  '#A23053',  // secondary emphasis
              // Neutral scale — for inactive, borders, text-on-light
              'neutral-50':  '#F4F2EE',
              'neutral-100': '#E9E5DD',
              'neutral-200': '#D9D6D0',
              'neutral-300': '#B8B4AC',
              'neutral-500': '#6B6862',
            },
            fontFamily: {
              // Inter Variable — Headlines, UI, navigation
              inter: ['Inter', 'system-ui', 'sans-serif'],
              // ABC Arizona Text fallback — Supporting headlines, editorial
              arizona: ['Georgia', '"Times New Roman"', 'serif'],
              // Antartican Mono fallback — Data, labels, captions
              mono: ['"SF Mono"', '"Fira Code"', '"Cascadia Code"', 'monospace'],
              // Times New Roman — Long-form body copy
              body: ['"Times New Roman"', 'Georgia', 'serif'],
            },
          },
        },
      }
    </script>
    <style>
      body {
        background: #F8F8F5; /* mist */
        font-family: 'Inter', system-ui, sans-serif;
        color: #1A1A1A;
      }
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #D9D6D0; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #B8B4AC; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
